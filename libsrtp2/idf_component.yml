version: "2.8.0"
description: "libsrtp 2.x (Cisco) wrapper for ESP-IDF — mbedTLS crypto backend with AES-GCM + AES-CM + HMAC-SHA1. SRTP/SRTCP packet protection for WebRTC and other RTP-based protocols."
url: "https://github.com/espressif/idf-extra-components/tree/master/libsrtp2"
repository: "https://github.com/espressif/idf-extra-components.git"
issues: "https://github.com/espressif/idf-extra-components/issues"
documentation: "https://github.com/espressif/idf-extra-components/blob/master/libsrtp2/README.md"
license: "Apache-2.0 AND BSD-3-Clause"
tags:
  - libsrtp
  - srtp
  - webrtc
  - mbedtls
dependencies:
  idf: ">=5.4"

# SBOM manifest for the wrapped upstream — see sbom_libsrtp.yml.
sbom:
  manifests:
    - path: sbom_libsrtp.yml
      dest: libsrtp

# Files excluded from the registry tarball (saves bytes, avoids confusion).
files:
  exclude:
    - "libsrtp/test/**"      # upstream tests are linked at host_test/ build time
    - "libsrtp/doc/**"
    - "libsrtp/**/.git*"
    - "host_test/build*"
    - "test_apps/build*"
    - "examples/*/build*"
